<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Music Player</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .player { max-width: 400px; margin: 0 auto; background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; backdrop-filter: blur(10px); }
        button { background: rgba(255,255,255,0.2); border: none; color: white; padding: 15px 25px; margin: 10px; border-radius: 50px; cursor: pointer; font-size: 16px; transition: all 0.3s; }
        button:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }
        button.active { background: #4A90E2; }
        audio { width: 100%; margin: 20px 0; }
        h1 { margin-bottom: 30px; }
        .track-info { margin: 20px 0; font-size: 18px; }
    </style>
</head>
<body>
    <div class="player">
        <h1>🎵 Simple Player</h1>
        <div class="track-info">
            <div id="now-playing">Select a track</div>
        </div>
        <audio id="audio" controls></audio>
        <br>
        <button onclick="playFile('kaka.mp3')">Play kaka.mp3</button>
        <button onclick="playFile('kaka.mpeg')">Play kaka.mpeg</button>
        <button onclick="playDemo()">Play Demo</button>
    </div>

    <script>
        const audio = document.getElementById('audio');
        
        function playFile(filename) {
            audio.src = filename;
            audio.load();
            audio.play();
            document.getElementById('now-playing').textContent = `Playing: ${filename}`;
        }
        
        function playDemo() {
            audio.src = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
            audio.load();
            audio.play();
            document.getElementById('now-playing').textContent = 'Playing: Demo Track';
        }
        
        audio.addEventListener('error', (e) => {
            console.error('Audio error:', e);
            alert('File not found or format error. Check filename.');
        });
    </script>
</body>
</html>
